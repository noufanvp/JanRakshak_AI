{% load static %}
<!DOCTYPE html>
<html lang="en-IN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — JanRakshak</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0B0F1A; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      background: #141B2D; border: 1px solid #1E2A42; border-radius: 20px;
      padding: 48px; width: 100%; max-width: 440px; position: relative;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, #3B82F6, transparent);
    }
    input {
      width: 100%; background: #0F1629; border: 1px solid #1E2A42;
      border-radius: 10px; color: #E2E8F0; padding: 12px 16px;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
      box-sizing: border-box;
    }
    input:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    input::placeholder { color: #475569; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #94A3B8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    button[type=submit] {
      width: 100%; background: linear-gradient(135deg, #2563EB, #1D4ED8);
      color: #fff; border: none; border-radius: 10px; padding: 13px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.02em;
    }
    button[type=submit]:hover { background: linear-gradient(135deg, #1D4ED8, #1E40AF); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,0.35); }
    .error-box { background: #2D1515; border: 1px solid #7F1D1D; border-radius: 10px; padding: 12px 16px; color: #FCA5A5; font-size: 0.85rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    /* Animated BG grid */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .glow-orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.25;
    }
    .login-card { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-orb" style="width:400px;height:400px;top:-100px;left:-100px;background:radial-gradient(circle,#3B82F6,transparent)"></div>
  <div class="glow-orb" style="width:300px;height:300px;bottom:-80px;right:-60px;background:radial-gradient(circle,#06B6D4,transparent)"></div>

  <div class="login-card">
    <!-- Brand -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center mb-4 shadow-lg shadow-blue-900/40">
        <svg viewBox="0 0 32 32" fill="none" class="w-8 h-8 text-white">
          <path d="M16 3L4 8V17C4 23.627 9.373 29 16 29C22.627 29 28 23.627 28 17V8L16 3Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 16L14.5 19.5L21 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 style="color:#E2E8F0; font-size:1.5rem; font-weight:800; letter-spacing:-0.02em; margin:0;">JanRakshak</h1>
      <p style="color:#64748B; font-size:0.85rem; margin-top:4px;">Administrator Access</p>
    </div>

    {% if error %}
    <div class="error-box">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="" autocomplete="off">
      {% csrf_token %}
      <div style="margin-bottom:20px;">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter admin username" autofocus required />
      </div>
      <div style="margin-bottom:28px;">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input id="password" name="password" type="password" placeholder="••••••••••••" required />
          <button type="button" id="pw-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748B;cursor:pointer;padding:0;display:flex;" aria-label="Toggle password visibility">
            <svg id="eye-open" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg id="eye-closed" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
      </div>
      <button type="submit">Sign In to Admin Panel</button>
    </form>

    <p style="text-align:center;color:#475569;font-size:0.75rem;margin-top:24px;">
      Restricted access. Unauthorized entry is prohibited.
    </p>
  </div>

  <script>
    document.getElementById('pw-toggle').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const eyeOpen = document.getElementById('eye-open');
      const eyeClosed = document.getElementById('eye-closed');
      if (pw.type === 'password') {
        pw.type = 'text';
        eyeOpen.classList.add('hidden');
        eyeClosed.classList.remove('hidden');
      } else {
        pw.type = 'password';
        eyeOpen.classList.remove('hidden');
        eyeClosed.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
