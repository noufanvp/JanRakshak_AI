# Render.com deployment configuration
# Deploy with: render deploy  OR connect GitHub repo in Render dashboard

services:
  - type: web
    name: civicai-india
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn -c gunicorn_config.py janrakshak_django.wsgi:application
    plan: free
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: civicai-db
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        value: civicai-india.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://civicai-india.onrender.com
    healthCheckPath: /

databases:
  - name: civicai-db
    databaseName: civicai_production
    user: civicai_user
    plan: free
